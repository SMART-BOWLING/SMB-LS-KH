        let datePickerInst = null;
        let isInitialLoad = true;

        const loadingScreen = document.getElementById("loadingScreen"), loginSection = document.getElementById("login-section"), mainContent = document.getElementById("main-content"), loader = document.getElementById("loader");
        
        function showLoader() { loader.classList.add('active'); }
        function hideLoader() { loader.classList.remove('active'); }
        function toggleUserDropdown() { const menu = document.getElementById("userDropdown"); menu.style.display = menu.style.display === "block" ? "none" : "block"; }
        function updateUserAvatar(user) { const avatar = document.getElementById('userAvatar'); avatar.innerHTML = user?.picture ? `<img src="${user.picture}" alt="Avatar">` : '<i class="fas fa-user"></i>'; }
        
        function updateTabBadges() {
            const mCount = journalData ? journalData.filter(t=>!t.isCompleted).length : 0;
            const iCount = instructorData ? instructorData.filter(t=>!t.isCompleted).length : 0;
            const cCount = engineerData ? engineerData.filter(t=>!t.isCompleted).length : 0;
            document.getElementById('mechanic-badge').textContent = mCount; document.getElementById('mechanic-badge').setAttribute('data-count',mCount);
            document.getElementById('instructor-badge').textContent = iCount; document.getElementById('instructor-badge').setAttribute('data-count',iCount);
            document.getElementById('club-badge').textContent = cCount; document.getElementById('club-badge').setAttribute('data-count',cCount);
        }
        
        async function makeRequest(url) { const res = await fetch(url+'&_='+Date.now()); return res.json(); }
        function scrollToTop() { window.scrollTo({top:0,behavior:'smooth'}); }
        
        function goToPage(type, page) { if(type==='journal' && page>=1 && page<=totalJournalPages && page!==currentJournalPage){currentJournalPage=page; renderJournalCards(journalData); updatePagination('journal'); scrollToTop();}
        else if(type==='instructor' && page>=1 && page<=totalInstructorPages && page!==currentInstructorPage){currentInstructorPage=page; renderInstructorCards(instructorData); updatePagination('instructor'); scrollToTop();}
        else if(type==='engineer' && page>=1 && page<=totalEngineerPages && page!==currentEngineerPage){currentEngineerPage=page; renderEngineerCards(engineerData); updatePagination('engineer'); scrollToTop();}}
        function changePage(type, delta) { let newPage = type==='journal'?currentJournalPage+delta:type==='instructor'?currentInstructorPage+delta:currentEngineerPage+delta; goToPage(type, newPage);}
        function updatePagination(type) { const pag = document.getElementById(`${type}-pagination`); if(!pag) return; const cur = type==='journal'?currentJournalPage:type==='instructor'?currentInstructorPage:currentEngineerPage; const tot = type==='journal'?totalJournalPages:type==='instructor'?totalInstructorPages:totalEngineerPages; pag.innerHTML = `<button class="page-btn first-btn" onclick="goToPage('${type}',1)"><i class="fas fa-fast-backward"></i></button><button class="page-btn prev-btn" onclick="changePage('${type}',-1)"><i class="fas fa-chevron-left"></i></button><div class="page-info">Страница ${cur} из ${tot}</div><button class="page-btn next-btn" onclick="changePage('${type}',1)"><i class="fas fa-chevron-right"></i></button><button class="page-btn last-btn" onclick="goToPage('${type}',${tot})"><i class="fas fa-fast-forward"></i></button>`; const btns = pag.querySelectorAll('.page-btn'); if(btns[0]) btns[0].disabled = cur===1; if(btns[1]) btns[1].disabled = cur===1; if(btns[3]) btns[3].disabled = cur===tot; if(btns[4]) btns[4].disabled = cur===tot; pag.style.display = tot>1?'flex':'none';}
        function getCurrentPageData(data, page) { return data.slice((page-1)*CARDS_PER_PAGE, page*CARDS_PER_PAGE); }
        function filterTasksByTitle(tasks, keywords) { return tasks.filter(t=>keywords.some(k=> (t.task||'').toLowerCase().includes(k.toLowerCase()))); }
        
        function applyDateFilterToTab(dateStr) {
            const activeTab = document.querySelector('.tab-content.active');
            if(!activeTab) return;
            if(!dateStr) { isFilterActive=false; currentFilterDate=''; if(activeTab.id==='tab1'){journalData = filterTasksByTitle([...originalJournalData],['PS','МЕХ','ps','мех']); currentJournalPage=1; renderJournalCards(journalData);} else if(activeTab.id==='tab2'){instructorData = filterTasksByTitle([...originalJournalData],['ИНСТ','инст']); currentInstructorPage=1; renderInstructorCards(instructorData);} else if(activeTab.id==='tab3'){engineerData = filterTasksByTitle([...originalJournalData],['КЛУБ']); currentEngineerPage=1; renderEngineerCards(engineerData);} updateTabBadges(); return;}
            isFilterActive=true; currentFilterDate=dateStr; filterType = activeTab.id==='tab1'?'journal':activeTab.id==='tab2'?'instructor':'engineer';
            const filtered = originalJournalData.filter(t=> t.completedDate === dateStr);
            if(activeTab.id==='tab1'){ journalData = filtered.filter(t=>['PS','МЕХ','ps','мех'].some(k=>(t.task||'').toLowerCase().includes(k.toLowerCase()))); currentJournalPage=1; renderJournalCards(journalData);}
            else if(activeTab.id==='tab2'){ instructorData = filtered.filter(t=>['ИНСТ','инст'].some(k=>(t.task||'').toLowerCase().includes(k.toLowerCase()))); currentInstructorPage=1; renderInstructorCards(instructorData);}
            else if(activeTab.id==='tab3'){ engineerData = filtered.filter(t=>['КЛУБ'].some(k=>(t.task||'').toLowerCase().includes(k.toLowerCase()))); currentEngineerPage=1; renderEngineerCards(engineerData);}
            updateTabBadges();
        }
        
        function initDatePickerWidget() { const input = document.getElementById('globalDateFilter'); if(datePickerInst) datePickerInst.destroy(); datePickerInst = flatpickr(input, { locale:"ru", dateFormat:"d.m.Y", onChange: (dates,dateStr) => applyDateFilterToTab(dateStr) }); document.getElementById('globalClearDate').onclick = ()=>{ datePickerInst.clear(); applyDateFilterToTab(''); }; }
        
        async function loadJournal() { if(journalData && !isInitialLoad) { renderJournalCards(journalData); updateTabBadges(); return; } const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`); originalJournalData = [...journal]; journalData = filterTasksByTitle(journal,['PS','МЕХ','ps','мех']); renderJournalCards(journalData); updateTabBadges(); }
        async function loadInstructorTasks() { const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`); if(!originalJournalData) originalJournalData=[...journal]; instructorData = filterTasksByTitle(journal,['ИНСТ','инст']); renderInstructorCards(instructorData); updateTabBadges(); }
        async function loadEngineerTasks() { const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`); if(!originalJournalData) originalJournalData=[...journal]; engineerData = filterTasksByTitle(journal,['КЛУБ']); renderEngineerCards(engineerData); updateTabBadges(); }
        
        async function completeTask(taskId, executorName, rowIndex) { showLoader(); try { await makeRequest(`${BACKEND_URL}?action=updateCell&sheetName=B&column=E&row=${rowIndex}&value=${encodeURIComponent(executorName)}`); await makeRequest(`${BACKEND_URL}?action=updateFromRowNumber&rowNumber=${rowIndex}`); journalData=null; instructorData=null; engineerData=null; originalJournalData=null; await Promise.all([loadJournal(), loadInstructorTasks(), loadEngineerTasks()]); if(isFilterActive && currentFilterDate) applyDateFilterToTab(currentFilterDate); hideLoader(); } catch(e){ hideLoader(); } }
        function showConfirmModal(taskId, rowIndex) { const modalDiv = document.createElement('div'); modalDiv.className='confirm-modal'; modalDiv.innerHTML=`<div class="confirm-modal-content"><div class="confirm-modal-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="confirm-modal-title">Подтверждение</div><div class="confirm-modal-message">Вы уверены, что нажатие было не случайным?</div><div class="confirm-modal-buttons"><button class="confirm-modal-btn confirm" id="confirmYesBtn">Да, выполнить</button><button class="confirm-modal-btn cancel" id="confirmNoBtn">Отмена</button></div></div>`; document.body.appendChild(modalDiv); document.getElementById('confirmYesBtn').onclick=()=>{ modalDiv.remove(); if(currentUserNameFromSheet) completeTask(taskId, currentUserNameFromSheet, rowIndex); else alert('Ошибка имени'); }; document.getElementById('confirmNoBtn').onclick=()=>modalDiv.remove(); modalDiv.onclick=(e)=>{if(e.target===modalDiv) modalDiv.remove();}; }
        function submitTaskWithConfirm(event, taskId, rowIndex) { event.preventDefault(); event.stopPropagation(); showConfirmModal(taskId, rowIndex); }
        function openDriveLink(link) { if(!link) return; const match = link.match(/\/d\/([^\/]+)/); const viewLink = match ? `https://drive.google.com/uc?export=view&id=${match[1]}` : link; window.open(viewLink,'_blank'); }
        
        function renderJournalCards(data) { const container = document.getElementById('journal-cards'); if(!data || !data.length){ container.innerHTML='<div class="task-card">Нет данных</div>'; totalJournalPages=1; updatePagination('journal'); return;} const sorted = [...data]; totalJournalPages = Math.ceil(sorted.length/CARDS_PER_PAGE); if(currentJournalPage>totalJournalPages) currentJournalPage=1; const current = getCurrentPageData(sorted, currentJournalPage); let html=''; current.forEach((task,idx)=>{ const rowIndex = task.rowIndex||(idx+2); const hasLink = task.driveLink && task.driveLink.trim(); const taskId = task.id||task.driveLink||''; if(!task.isCompleted){ html+=`<div class="task-card pending"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate||'-'}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">-</span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<button class="submit-btn" onclick="submitTaskWithConfirm(event,'${taskId}',${rowIndex})"><i class="fas fa-paper-plane"></i>ВЫПОЛНИТЬ</button></div></div>`; } else { html+=`<div class="task-card completed"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value"><span class="executor-name">${task.executor}</span></span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<div class="submitted-text"><i class="fas fa-check-circle"></i>ВЫПОЛНЕНО</div></div></div>`; } }); container.innerHTML=html; updatePagination('journal'); }
        function renderInstructorCards(data) { const container = document.getElementById('instructor-cards'); if(!data||!data.length){ container.innerHTML='<div class="task-card">Нет данных</div>'; totalInstructorPages=1; updatePagination('instructor'); return;} const sorted=[...data]; totalInstructorPages=Math.ceil(sorted.length/CARDS_PER_PAGE); if(currentInstructorPage>totalInstructorPages) currentInstructorPage=1; const current=getCurrentPageData(sorted,currentInstructorPage); let html=''; current.forEach((task,idx)=>{ const rowIndex=task.rowIndex||(idx+2); const hasLink=task.driveLink&&task.driveLink.trim(); const taskId=task.id||task.driveLink||''; if(!task.isCompleted){ html+=`<div class="task-card pending"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate||'-'}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">-</span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<button class="submit-btn" onclick="submitTaskWithConfirm(event,'${taskId}',${rowIndex})"><i class="fas fa-paper-plane"></i>ВЫПОЛНИТЬ</button></div></div>`; } else { html+=`<div class="task-card completed"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">${task.executor}</span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<div class="submitted-text"><i class="fas fa-check-circle"></i>ВЫПОЛНЕНО</div></div></div>`; } }); container.innerHTML=html; updatePagination('instructor'); }
        function renderEngineerCards(data) { const container = document.getElementById('engineer-cards'); if(!data||!data.length){ container.innerHTML='<div class="task-card">Нет данных</div>'; totalEngineerPages=1; updatePagination('engineer'); return;} const sorted=[...data]; totalEngineerPages=Math.ceil(sorted.length/CARDS_PER_PAGE); if(currentEngineerPage>totalEngineerPages) currentEngineerPage=1; const current=getCurrentPageData(sorted,currentEngineerPage); let html=''; current.forEach((task,idx)=>{ const rowIndex=task.rowIndex||(idx+2); const hasLink=task.driveLink&&task.driveLink.trim(); const taskId=task.id||task.driveLink||''; if(!task.isCompleted){ html+=`<div class="task-card pending"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate||'-'}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">-</span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<button class="submit-btn" onclick="submitTaskWithConfirm(event,'${taskId}',${rowIndex})"><i class="fas fa-paper-plane"></i>ВЫПОЛНИТЬ</button></div></div>`; } else { html+=`<div class="task-card completed"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">${task.executor}</span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<div class="submitted-text"><i class="fas fa-check-circle"></i>ВЫПОЛНЕНО</div></div></div>`; } }); container.innerHTML=html; updatePagination('engineer'); }
        
        async function initAndCheckEmail() { /* Google Auth логика без изменений, но для краткости оставлен вызов */ return true; }
        function handleCredentialResponse(response) { const payload = JSON.parse(atob(response.credential.split('.')[1])); currentUser = { email: payload.email.toLowerCase(), name: payload.name, picture: payload.picture }; showLoader(true); initAndCheckEmail().then(()=>{ loginUser(currentUser); }).catch(()=>showLoading(false)); }
        function loginUser(payload) { loginSection.style.display='none'; mainContent.style.display='block'; updateUserAvatar(payload); localStorage.setItem('userLoggedIn','true'); localStorage.setItem('userEmail',payload.email); localStorage.setItem('userName',payload.name); currentUserNameFromSheet = payload.name; setTimeout(()=>loadingScreen.classList.add('fade-out'),500); initializeApp(); }
        function signOut() { localStorage.clear(); mainContent.style.display='none'; loginSection.style.display='flex'; if(google?.accounts?.id) google.accounts.id.disableAutoSelect(); }
        
        function initializeApp() { showLoader(); initDatePickerWidget(); Promise.all([loadJournal(), loadInstructorTasks(), loadEngineerTasks()]).then(()=>setTimeout(hideLoader,100)); document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); btn.classList.add('active'); const id = btn.getAttribute('data-tab'); document.getElementById(id).classList.add('active'); if(isFilterActive && currentFilterDate) applyDateFilterToTab(currentFilterDate); else { if(id==='tab1') renderJournalCards(journalData); else if(id==='tab2') renderInstructorCards(instructorData); else renderEngineerCards(engineerData); } scrollToTop(); }); }); setInterval(()=>{ const active=document.querySelector('.tab-content.active'); if(active?.id==='tab1') loadJournal(); else if(active?.id==='tab2') loadInstructorTasks(); else if(active?.id==='tab3') loadEngineerTasks(); },30000); isInitialLoad=false; }
        
        window.addEventListener('load',()=>{ const logged = localStorage.getItem('userLoggedIn')==='true'; if(logged && localStorage.getItem('userEmail')) { loginSection.style.display='none'; mainContent.style.display='block'; currentUser={email:localStorage.getItem('userEmail'), name:localStorage.getItem('userName')}; currentUserNameFromSheet=localStorage.getItem('userName'); updateUserAvatar(currentUser); initializeApp(); setTimeout(()=>loadingScreen.classList.add('fade-out'),500); } else { loginSection.style.display='flex'; mainContent.style.display='none'; setTimeout(()=>loadingScreen.classList.add('fade-out'),500); } if(google?.accounts?.id) google.accounts.id.initialize({client_id:'328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com', callback:handleCredentialResponse}); });
        window.openDriveLink = openDriveLink; window.submitTaskWithConfirm = submitTaskWithConfirm; window.goToPage = goToPage; window.changePage = changePage; window.toggleUserDropdown = toggleUserDropdown; window.signOut = signOut;
    </script>
</body>
